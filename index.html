<!DOCTYPE html>

    <style>

        body {

            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;

        }
        h1 {

        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s, background 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.12);
        }
        .app-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .app-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .icon-1 { background: linear-gradient(135deg, #667eea, #764ba2); }
        .icon-2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .icon-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .app-name {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }
        .app-size {
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            margin-top: 4px;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        .download-btn:hover {
            opacity: 0.88;
            transform: scale(1.03);
        }
        .download-btn svg {
            width: 18px;
            height: 18px;
        }
        @media (max-width: 500px) {
            .card { flex-direction: column; gap: 16px; text-align: center; }
            .app-info { flex-direction: column; }
        }
    </style>
</head>
